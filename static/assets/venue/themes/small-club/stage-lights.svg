  <g id="spot-beams" class="spot-beams" opacity="0.85">
    <path id="spot-beam-left-halo" class="spot-beam spot-beam-cyan" d="M228 6 L148 500 L308 500 Z" fill="url(#beamCyanHalo)"/>
    <path id="spot-beam-left" class="spot-beam spot-beam-cyan" d="M228 6 L188 500 L268 500 Z" fill="url(#beamCyanCore)"/>
    <path id="spot-beam-center-halo" class="spot-beam spot-beam-amber" d="M600 4 L480 510 L720 510 Z" fill="url(#beamAmberHalo)"/>
    <path id="spot-beam-center" class="spot-beam spot-beam-amber" d="M600 4 L540 510 L660 510 Z" fill="url(#beamAmberCore)"/>
    <path id="spot-beam-right-halo" class="spot-beam spot-beam-violet" d="M972 8 L892 500 L1052 500 Z" fill="url(#beamVioletHalo)"/>
    <path id="spot-beam-right" class="spot-beam spot-beam-violet" d="M972 8 L932 500 L1012 500 Z" fill="url(#beamVioletCore)"/>
  </g>

  <g id="light-fixtures" class="light-fixtures">
    <rect x="212" y="0" width="32" height="12" rx="3" fill="#101820" stroke="#2a3a52" stroke-width="1.5"/>
    <rect x="584" y="0" width="32" height="12" rx="3" fill="#101820" stroke="#2a3a52" stroke-width="1.5"/>
    <rect x="956" y="0" width="32" height="12" rx="3" fill="#101820" stroke="#2a3a52" stroke-width="1.5"/>
    <circle cx="228" cy="18" r="10" fill="url(#fixtureGlowCyan)" opacity="0.75"/>
    <circle cx="600" cy="18" r="10" fill="url(#fixtureGlowAmber)" opacity="0.75"/>
    <circle cx="972" cy="18" r="10" fill="url(#fixtureGlowViolet)" opacity="0.75"/>
    <circle cx="228" cy="16" r="4" fill="#3d5570"/>
    <circle cx="600" cy="16" r="4" fill="#3d5570"/>
    <circle cx="972" cy="16" r="4" fill="#3d5570"/>
  </g>
