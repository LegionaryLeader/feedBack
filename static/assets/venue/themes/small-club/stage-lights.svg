<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Stage spotlights">
  <defs>
    <linearGradient id="beamCyanCore" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.9"/>
      <stop offset="14%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#0891b2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamCyanHalo" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.22"/>
      <stop offset="25%" stop-color="#22d3ee" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamAmberCore" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.88"/>
      <stop offset="14%" stop-color="#f59e0b" stop-opacity="0.48"/>
      <stop offset="45%" stop-color="#b45309" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamAmberHalo" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.2"/>
      <stop offset="25%" stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamVioletCore" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ddd6fe" stop-opacity="0.82"/>
      <stop offset="14%" stop-color="#8b5cf6" stop-opacity="0.42"/>
      <stop offset="45%" stop-color="#5b21b6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamVioletHalo" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.18"/>
      <stop offset="25%" stop-color="#8b5cf6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="fixtureGlowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fixtureGlowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fixtureGlowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ddd6fe" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
