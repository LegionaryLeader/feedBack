<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" role="img" aria-label="Audience silhouettes">
  <defs>
    <linearGradient id="crowdFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020306" stop-opacity="0"/>
      <stop offset="55%" stop-color="#020306" stop-opacity="0.08"/>
      <stop offset="82%" stop-color="#010204" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#010204" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="240" fill="url(#crowdFade)"/>

  <!-- Rear row — softer audience mass behind -->
  <path id="crowd-rear-row" class="crowd-row crowd-rear crowd-silhouette"
