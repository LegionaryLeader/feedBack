       C 1070 200 1076 148 1100 150 C 1124 152 1130 200 1154 200
       C 1178 200 1184 168 1208 170 L 1240 200 L 1240 240 Z"/>

  <!-- Subtle raised arms — connected to crowd band -->
  <g id="crowd-hands" class="crowd-hands" fill="#050810" opacity="0.5">
    <path class="crowd-hand" d="M236 200 L250 162 L260 200 Z"/>
    <path class="crowd-hand" d="M536 200 L552 138 L564 200 Z"/>
    <path class="crowd-hand" d="M856 200 L870 158 L880 200 Z"/>
    <path class="crowd-hand" d="M1076 200 L1090 164 L1100 200 Z"/>
