       C 350 188 356 156 380 158 C 404 160 410 188 434 188
       C 458 188 464 162 488 164 C 512 166 518 188 542 188
       C 566 188 572 154 596 156 C 620 158 626 188 650 188
       C 674 188 680 160 704 162 C 728 164 734 188 758 188
       C 782 188 788 158 812 160 C 836 162 842 188 866 188
       C 890 188 896 162 920 164 C 944 166 950 188 974 188
       C 998 188 1004 156 1028 158 C 1052 160 1058 188 1082 188
       C 1106 188 1112 162 1136 164 C 1160 166 1166 188 1190 188
       L 1200 188 L 1200 240 Z"/>

  <!-- Front row — darker head/shoulder silhouettes -->
  <path id="crowd-front-row" class="crowd-row crowd-front crowd-silhouette"
    fill="#060a10" opacity="0.88"
    d="M-40 240 L-40 200
       C -10 200 -4 168 20 170 C 44 172 50 200 74 200
       C 98 200 104 148 128 150 C 152 152 158 200 182 200
       C 206 200 212 172 236 174 C 260 176 266 200 290 200
       C 314 200 320 142 344 144 C 368 146 374 200 398 200
       C 422 200 428 168 452 170 C 476 172 482 200 506 200
       C 530 200 536 152 560 154 C 584 156 590 200 614 200
       C 638 200 644 146 668 148 C 692 150 698 200 722 200
       C 746 200 752 170 776 172 C 800 174 806 200 830 200
       C 854 200 860 150 884 152 C 908 154 914 200 938 200
