<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Small club stage backdrop">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020408"/>
      <stop offset="38%" stop-color="#060a12"/>
      <stop offset="100%" stop-color="#020306"/>
    </linearGradient>
    <linearGradient id="sideWall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#010204"/>
      <stop offset="55%" stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#04080e"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#080e16"/>
      <stop offset="50%" stop-color="#121a28"/>
      <stop offset="100%" stop-color="#080e16"/>
    </linearGradient>
    <radialGradient id="centerVignette" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.82"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stageDeck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2434"/>
      <stop offset="100%" stop-color="#05080c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#wall)"/>

  <!-- Side walls for room depth -->
  <path id="side-wall-left" class="side-wall" d="M0 0 L0 800 L118 800 L210 0 Z" fill="url(#sideWall)" opacity="0.92"/>
  <path id="side-wall-right" class="side-wall" d="M1200 0 L1200 800 L1082 800 L990 0 Z" fill="url(#sideWall)" opacity="0.92"/>

  <g id="lighting-truss" class="lighting-truss" fill="none" stroke="#1a2838" stroke-width="3" opacity="0.9">
    <line x1="60" y1="68" x2="1140" y2="68"/>
    <line x1="140" y1="68" x2="140" y2="94"/>
    <line x1="380" y1="68" x2="380" y2="94"/>
    <line x1="600" y1="68" x2="600" y2="94"/>
    <line x1="820" y1="68" x2="820" y2="94"/>
    <line x1="1060" y1="68" x2="1060" y2="94"/>
  </g>

  <path id="stage-curtain" class="stage-curtain" d="M150 128 Q600 52 1050 128 L1030 488 Q600 448 170 488 Z" fill="url(#curtain)" opacity="0.94"/>
  <path d="M170 488 Q600 458 1030 488 L1010 548 Q600 518 190 548 Z" fill="#080c14" opacity="0.96"/>

  <g id="speaker-stack-left" class="speaker-stack" fill="#0a1018" stroke="#1e2c40" stroke-width="2">
    <rect x="44" y="292" width="68" height="104" rx="5"/>
    <rect x="50" y="304" width="56" height="20" rx="2" fill="#04060a"/>
    <rect x="50" y="332" width="56" height="20" rx="2" fill="#04060a"/>
    <rect x="50" y="360" width="56" height="20" rx="2" fill="#04060a"/>
    <rect x="44" y="408" width="68" height="82" rx="5"/>
    <rect x="50" y="420" width="56" height="16" rx="2" fill="#04060a"/>
    <rect x="50" y="444" width="56" height="16" rx="2" fill="#04060a"/>
  </g>
  <g id="speaker-stack-right" class="speaker-stack" fill="#0a1018" stroke="#1e2c40" stroke-width="2">
    <rect x="1088" y="292" width="68" height="104" rx="5"/>
    <rect x="1094" y="304" width="56" height="20" rx="2" fill="#04060a"/>
    <rect x="1094" y="332" width="56" height="20" rx="2" fill="#04060a"/>
    <rect x="1094" y="360" width="56" height="20" rx="2" fill="#04060a"/>
    <rect x="1088" y="408" width="68" height="82" rx="5"/>
    <rect x="1094" y="420" width="56" height="16" rx="2" fill="#04060a"/>
    <rect x="1094" y="444" width="56" height="16" rx="2" fill="#04060a"/>
  </g>

  <g class="amp-cabinet" fill="#060a10" stroke="#121c2a" stroke-width="2">
    <rect x="218" y="438" width="52" height="68" rx="4"/>
    <rect x="226" y="450" width="36" height="44" rx="2" fill="#030508"/>
    <rect x="930" y="438" width="52" height="68" rx="4"/>
    <rect x="938" y="450" width="36" height="44" rx="2" fill="#030508"/>
  </g>

  <g id="stage-platform" class="stage-platform">
    <path d="M90 568 Q600 528 1110 568 L1125 636 Q600 600 75 636 Z" fill="url(#stageDeck)"/>
    <line x1="90" y1="568" x2="1110" y2="568" stroke="#2c4058" stroke-width="4" opacity="0.65"/>
    <path d="M75 636 L1125 636 L1125 800 L75 800 Z" fill="#030508"/>
  </g>

  <rect width="1200" height="800" fill="url(#centerVignette)"/>
</svg>
